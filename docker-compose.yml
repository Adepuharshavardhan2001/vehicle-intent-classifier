services:
  db:
    image: mysql:8.0
    container_name: vehicle_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: vehicle_logs
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

  api:
    build: .
    container_name: vehicle_api
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://root:password@db:3306/vehicle_logs
    volumes:
      - ./models:/app/models
    # --- THIS IS THE NEW LINE THAT FIXES THE CRASH ---
    command: ["sh", "-c", "sleep 15 && uvicorn app.main:app --host 0.0.0.0 --port 8000"]

volumes:
  mysql_data: