version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: vehicle_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: vehicle_logs
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - vehicle_network

  api:
    build: .
    container_name: vehicle_api
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://root:password@db:3306/vehicle_logs
      MODEL_PATH: /app/models/distilbert_finetuned
      LABEL_PATH: /app/models/label_map.json
    volumes:
      - ./models:/app/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - vehicle_network

volumes:
  mysql_data:

networks:
  vehicle_network:
    driver: bridge