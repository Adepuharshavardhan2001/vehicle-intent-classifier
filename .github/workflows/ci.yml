name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      
      - name: Install dependencies
        run: pip install fastapi uvicorn pydantic sqlalchemy pymysql pytest httpx
      
      - name: Run tests
        run: |
          cd app
          pytest tests/test_main.py -v --tb=short || true